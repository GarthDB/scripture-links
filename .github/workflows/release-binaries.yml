# Build binaries and attach to GitHub Release created by release-plz.
# Updates Homebrew formula after release assets are uploaded.
name: Release binaries

on:
  release:
    types: [published]

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: scripture-links-x86_64-unknown-linux-gnu.tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: scripture-links-x86_64-unknown-linux-musl.tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            name: scripture-links-x86_64-apple-darwin.tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            name: scripture-links-aarch64-apple-darwin.tar.gz
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            name: scripture-links-x86_64-pc-windows-msvc.zip
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: matrix.os != 'windows-2022'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.name }} scripture-links
          cd -

      - name: Package binary (Windows)
        if: matrix.os == 'windows-2022'
        run: |
          cd target/${{ matrix.target }}/release
          7z a ../../../${{ matrix.name }} scripture-links.exe
          cd -

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}

  upload-release:
    name: Upload to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    name: Update Homebrew Formula
    needs: upload-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Main Repo
        uses: actions/checkout@v6

      - name: Checkout Homebrew Tap
        uses: actions/checkout@v6
        with:
          repository: GarthDB/homebrew-scripture-links
          token: ${{ secrets.HOMEBREW_PAT }}
          path: homebrew-tap

      - name: Set version
        id: version
        run: echo "version=${TAG_NAME#v}" >> $GITHUB_OUTPUT
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Download Release Assets and Calculate Checksums
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          curl -L -o scripture-links-aarch64-apple-darwin.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/scripture-links-aarch64-apple-darwin.tar.gz"
          curl -L -o scripture-links-x86_64-apple-darwin.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/scripture-links-x86_64-apple-darwin.tar.gz"
          curl -L -o scripture-links-x86_64-unknown-linux-gnu.tar.gz \
            "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/scripture-links-x86_64-unknown-linux-gnu.tar.gz"

          MACOS_ARM64_SHA=$(shasum -a 256 scripture-links-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)
          MACOS_X64_SHA=$(shasum -a 256 scripture-links-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)
          LINUX_X64_SHA=$(shasum -a 256 scripture-links-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)

          echo "MACOS_ARM64_SHA=$MACOS_ARM64_SHA" >> $GITHUB_ENV
          echo "MACOS_X64_SHA=$MACOS_X64_SHA" >> $GITHUB_ENV
          echo "LINUX_X64_SHA=$LINUX_X64_SHA" >> $GITHUB_ENV

      - name: Update Homebrew Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          cat > homebrew-tap/Formula/scripture-links.rb << EOF
          class ScriptureLinks < Formula
            desc "Convert scripture references to URLs for ChurchofJesusChrist.org"
            homepage "https://github.com/GarthDB/scripture-links"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/GarthDB/scripture-links/releases/download/v${VERSION}/scripture-links-aarch64-apple-darwin.tar.gz"
                sha256 "${MACOS_ARM64_SHA}"
              else
                url "https://github.com/GarthDB/scripture-links/releases/download/v${VERSION}/scripture-links-x86_64-apple-darwin.tar.gz"
                sha256 "${MACOS_X64_SHA}"
              end
            end

            on_linux do
              url "https://github.com/GarthDB/scripture-links/releases/download/v${VERSION}/scripture-links-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${LINUX_X64_SHA}"
            end

            def install
              bin.install "scripture-links"
            end

            test do
              output = shell_output("#{bin}/scripture-links --reference 'Genesis 1:1'")
              assert_match "https://www.churchofjesuschrist.org/study/scriptures/ot/gen/1", output

              help_output = shell_output("#{bin}/scripture-links --help")
              assert_match "Generate links to scriptures on ChurchofJesusChrist.org", help_output
            end
          end
          EOF

      - name: Commit and Push Formula Update
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/scripture-links.rb
          git commit -m "Update scripture-links to v${{ steps.version.outputs.version }}"
          git push
